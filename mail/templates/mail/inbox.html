{% extends "mail/layout.html" %}
{% load static %}

{% block body %}
   

    <div id="messages"></div>
    
    <div id="emails-view" class="overflow-y-auto">
    </div>

    <div id="email-view"></div>

    <div id="compose-view" class="p-5">
        <h3>New Email</h3>
        <div id="compose-errors"></div>
        <form id="compose-form">
            <div class="form-group">
                From: <input disabled class="form-control" value="{{ request.user.email }}">
            </div>
            <div class="form-group">
                To: <input id="compose-recipients" class="form-control" placeholder="Please enter valid email addresses separated by spaces or ,">
            </div>
            <div class="form-group">
                <input class="form-control" id="compose-subject" placeholder="Subject">
            </div>
            <textarea class="form-control" id="compose-body" placeholder="Body" rows="10"></textarea>
            <input type="submit" class="btn btn-primary" value="Send"/>
        </form>
    </div>
{% endblock %}

{% block script %}
    <script src="{% static 'mail/inbox.js' %}"></script>
{% endblock %}
